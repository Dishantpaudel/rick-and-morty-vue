name: Vue CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  Lint-Format-and-Test:
    name: Lint, Format and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # FIXED: Added .vue to the check so it doesn't miss your components
      - name: Check Formatting
        run: npx prettier --check "src/**/*.{js,jsx,css,vue}"

      - name: Run Linting
        run: npm run lint

      - name: Run Tests
        run: npm run test